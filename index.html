<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="color-scheme" content="light" />

    <!-- Primary SEO -->
    <title>LavLay – Earn While You Scroll | Nigeria's Social Media Platform</title>
    <meta name="description" content="Join LavLay – Nigeria's social media platform where you earn real money by watching reels, reading posts, and engaging with content. Withdraw to your bank or mobile money." />
    <meta name="keywords" content="LavLay, earn money Nigeria, social media earn, Nigerian social platform, earn points, watch reels earn, lavlay.com" />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://www.lavlay.com/" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.lavlay.com/" />
    <meta property="og:title" content="LavLay – Earn While You Scroll" />
    <meta property="og:description" content="Nigeria's social platform that pays you. Earn points watching reels and reading posts, withdraw to your bank or mobile money." />
    <meta property="og:image" content="https://www.lavlay.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="LavLay" />
    <meta property="og:locale" content="en_NG" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@lavlayapp" />
    <meta name="twitter:title" content="LavLay – Earn While You Scroll" />
    <meta name="twitter:description" content="Nigeria's social platform that pays you. Earn points watching reels and reading posts, withdraw to your bank or mobile money." />
    <meta name="twitter:image" content="https://www.lavlay.com/og-image.png" />

    <!-- Structured data (WebSite + Organization) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@graph": [
        {
          "@type": "WebSite",
          "@id": "https://www.lavlay.com/#website",
          "url": "https://www.lavlay.com/",
          "name": "LavLay",
          "description": "Nigeria's social media platform where you earn real money by engaging with content.",
          "potentialAction": {
            "@type": "SearchAction",
            "target": {
              "@type": "EntryPoint",
              "urlTemplate": "https://www.lavlay.com/search?q={search_term_string}"
            },
            "query-input": "required name=search_term_string"
          }
        },
        {
          "@type": "Organization",
          "@id": "https://www.lavlay.com/#organization",
          "name": "LavLay",
          "url": "https://www.lavlay.com/",
          "logo": {
            "@type": "ImageObject",
            "url": "https://www.lavlay.com/logo.png"
          },
          "sameAs": [
            "https://twitter.com/lavlayapp"
          ],
          "contactPoint": {
            "@type": "ContactPoint",
            "contactType": "customer support",
            "email": "support@lavlay.com"
          }
        }
      ]
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <style>
      html { color-scheme: light; }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
